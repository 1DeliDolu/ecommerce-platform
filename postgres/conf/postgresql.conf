listen_addresses = '*'
port = 5432

ssl = on
ssl_cert_file = '/certs/server.crt'
ssl_key_file  = '/certs/server.key'
ssl_ca_file   = '/certs/ca.crt'
ssl_min_protocol_version = 'TLSv1.2'

password_encryption = 'scram-sha-256'

log_connections    = on
log_disconnections = on
log_line_prefix    = '%m [%p] %u@%d %r '
