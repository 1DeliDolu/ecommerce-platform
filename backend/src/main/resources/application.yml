server:
  port: 8080

spring:
  application:
    name: ecommerce-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecommerce}
    username: ${SPRING_DATASOURCE_USERNAME:ecommerce_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:ecommerce-backend}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.pehlione.ecommerce.event
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:ecommerce}
    password: ${SPRING_RABBITMQ_PASSWORD:ecommerce}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1s
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 25MB

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ecommerce-backend

security:
  jwt:
    # Symmetric HMAC-SHA256: set JWT_SECRET (at least 32 bytes)
    secret: ${JWT_SECRET:}
    # Asymmetric RS256: set both JWT_PRIVATE_KEY and JWT_PUBLIC_KEY (base64-encoded PKCS8/X509)
    # When both are present, RS256 is used and JWT_SECRET is ignored.
    private-key: ${JWT_PRIVATE_KEY:}
    public-key: ${JWT_PUBLIC_KEY:}
    expiration-minutes: 30

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  mail:
    from: ${APP_MAIL_FROM:no-reply@enterprise-shop.local}
    admin-to: ${APP_MAIL_ADMIN_TO:admin@example.com}
