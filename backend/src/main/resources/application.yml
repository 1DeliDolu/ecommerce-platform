server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ecommerce-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecommerce}
    username: ${SPRING_DATASOURCE_USERNAME:ecommerce_user}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        "[format_sql]": true
        jdbc:
          "[time_zone]": UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:ecommerce-backend}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        "[spring.json.trusted.packages]": com.pehlione.ecommerce.event

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:ecommerce}
    password: ${SPRING_RABBITMQ_PASSWORD:ecommerce}
    listener:
      simple:
        retry:
          enabled: true
          max-retries: 3
          initial-interval: 1s
          multiplier: 2
          max-interval: 10s

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 25MB

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

  metrics:
    tags:
      application: ${spring.application.name}

security:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:/app/secrets/jwt_private_key.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:/app/secrets/jwt_public_key.pem}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:30}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  mail:
    from: ${APP_MAIL_FROM:no-reply@enterprise-shop.local}
    admin-to: ${APP_MAIL_ADMIN_TO:admin@example.com}

  security:
    rate-limit:
      auth-requests-per-minute: ${RATE_LIMIT_AUTH_RPM:20}
