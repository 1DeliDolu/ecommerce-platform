# TYPE      DATABASE  USER  ADDRESS       METHOD

# Container içi bakım/init için Unix socket
local       all       all                 trust

# Docker bridge ve iç ağ — GUI araçları + pgAdmin container (SSL opsiyonel)
host        all       all   172.0.0.0/8   scram-sha-256
host        all       all   10.0.0.0/8    scram-sha-256

# TCP'de non-SSL bağlantıları reddet (yukarıdaki host kuralına girmeyen)
hostnossl   all       all   0.0.0.0/0     reject
hostnossl   all       all   ::0/0         reject

# TCP'de sadece TLS + SCRAM password
hostssl     all       all   127.0.0.1/32  scram-sha-256
hostssl     all       all   ::1/128       scram-sha-256
hostssl     all       all   0.0.0.0/0     scram-sha-256
hostssl     all       all   ::0/0         scram-sha-256
