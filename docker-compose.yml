name: ecommerce-platform

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 30s

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.5
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-ecommerce_user}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-ecommerce}
    AIRFLOW_CONN_ECOMMERCE_POSTGRES: postgresql://${POSTGRES_USER:-ecommerce_user}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-ecommerce}
    _PIP_ADDITIONAL_REQUIREMENTS: ${AIRFLOW_PIP_ADDITIONAL_REQUIREMENTS:-apache-airflow-providers-postgres==5.13.1}
  volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - backend-net

services:
  postgres-certs:
    image: alpine:3
    container_name: ecommerce-postgres-certs
    restart: "no"
    environment:
      POSTGRES_UID: ${POSTGRES_UID:-999}
    command:
      - /bin/sh
      - -euc
      - |
        apk add --no-cache openssl >/dev/null

        if [ -f /server/server.crt ] && [ -f /server/server.key ] && [ -f /public/ca.crt ]; then
          echo "PostgreSQL TLS certificates already exist."
          exit 0
        fi

        rm -f /server/* /public/*

        openssl genrsa -out /tmp/ca.key 4096

        openssl req -x509 -new -nodes \
          -key /tmp/ca.key \
          -sha256 -days 3650 \
          -out /public/ca.crt \
          -subj "/CN=ecommerce-local-postgres-ca"

        cp /public/ca.crt /server/ca.crt

        cat > /tmp/server.cnf <<'EOF'
        [req]
        default_bits = 4096
        prompt = no
        default_md = sha256
        distinguished_name = dn
        req_extensions = req_ext

        [dn]
        CN = postgres

        [req_ext]
        subjectAltName = @alt_names
        keyUsage = critical, digitalSignature, keyEncipherment
        extendedKeyUsage = serverAuth

        [alt_names]
        DNS.1 = postgres
        DNS.2 = localhost
        IP.1 = 127.0.0.1
        EOF

        openssl genrsa -out /server/server.key 4096

        openssl req -new \
          -key /server/server.key \
          -out /tmp/server.csr \
          -config /tmp/server.cnf

        openssl x509 -req \
          -in /tmp/server.csr \
          -CA /public/ca.crt \
          -CAkey /tmp/ca.key \
          -CAcreateserial \
          -out /server/server.crt \
          -days 825 \
          -sha256 \
          -extfile /tmp/server.cnf \
          -extensions req_ext

        rm -f /tmp/ca.key /tmp/server.csr /public/ca.srl

        chmod 600 /server/server.key
        chmod 644 /server/server.crt /server/ca.crt /public/ca.crt

        chown -R "${POSTGRES_UID}:${POSTGRES_UID}" /server

        echo "PostgreSQL TLS certificates generated."
    volumes:
      - postgres_server_certs:/server
      - postgres_public_certs:/public

  postgres:
    image: postgres:17-bookworm
    container_name: ecommerce-postgres
    restart: unless-stopped
    depends_on:
      postgres-certs:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      PGDATA: /var/lib/postgresql/data/pgdata
    secrets:
      - postgres_password
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_server_certs:/certs:ro
      - ./postgres/conf/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/conf/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - backend-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGSSLMODE=require pg_isready -h 127.0.0.1 -p 5432 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""
        ]
      <<: *healthcheck-defaults

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ecommerce}?sslmode=verify-full&sslrootcert=/certs/ca.crt"
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ecommerce_user}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env before starting the backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-ecommerce}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-ecommerce}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-no-reply@enterprise-shop.local}
      APP_MAIL_ADMIN_TO: ${APP_MAIL_ADMIN_TO:-admin@example.com}
    secrets:
      - source: postgres_password
        target: spring.datasource.password
    volumes:
      - ./uploads:/app/uploads
      - postgres_public_certs:/certs:ro
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      <<: *healthcheck-defaults
      start_period: 60s
    networks:
      - backend-net
      - frontend-net

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: ecommerce-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - backend-net

  kafka:
    image: bitnami/kafka:3.7
    container_name: ecommerce-kafka
    restart: unless-stopped
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "${KAFKA_PORT:-9094}:9094"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      <<: *healthcheck-defaults
    networks:
      - backend-net

  kafka-init:
    image: bitnami/kafka:3.7
    container_name: ecommerce-kafka-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/create-topics.sh:/scripts/create-topics.sh:ro
    command: ["/bin/bash", "/scripts/create-topics.sh"]
    networks:
      - backend-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ecommerce-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: ecommerce-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "${KAFKA_UI_PORT:-8085}:8080"
    networks:
      - backend-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ecommerce-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-ecommerce}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-ecommerce}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      <<: *healthcheck-defaults
    networks:
      - backend-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: ecommerce-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - frontend-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ecommerce-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - backend-net

  prometheus:
    image: prom/prometheus:latest
    container_name: ecommerce-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    depends_on:
      backend:
        condition: service_healthy
      postgres-exporter:
        condition: service_started
      kafka-exporter:
        condition: service_started
      rabbitmq-exporter:
        condition: service_started
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - backend-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: ecommerce-postgres-exporter
    restart: unless-stopped
    profiles: ["monitoring"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-ecommerce_user}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-ecommerce}?sslmode=require"
    networks:
      - backend-net

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: ecommerce-kafka-exporter
    restart: unless-stopped
    profiles: ["monitoring"]
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - "--kafka.server=kafka:9092"
    networks:
      - backend-net

  rabbitmq-exporter:
    image: kbudde/rabbitmq-exporter:latest
    container_name: ecommerce-rabbitmq-exporter
    restart: unless-stopped
    profiles: ["monitoring"]
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBIT_URL: http://rabbitmq:15672
      RABBIT_USER: ${RABBITMQ_USER:-ecommerce}
      RABBIT_PASSWORD: ${RABBITMQ_PASSWORD:-ecommerce}
    networks:
      - backend-net

  grafana:
    image: grafana/grafana-oss:latest
    container_name: ecommerce-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    networks:
      - backend-net

  airflow-init:
    <<: *airflow-common
    container_name: ecommerce-airflow-init
    restart: "no"
    profiles: ["etl"]
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USER:-admin}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Data \
          --lastname Admin \
          --role Admin \
          --email admin@example.com || true
    environment:
      <<: *airflow-common-env
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}

  airflow-webserver:
    <<: *airflow-common
    container_name: ecommerce-airflow-webserver
    restart: unless-stopped
    profiles: ["etl"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8088}:8080"
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\" || curl --fail http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-scheduler:
    <<: *airflow-common
    container_name: ecommerce-airflow-scheduler
    restart: unless-stopped
    profiles: ["etl"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt

volumes:
  postgres_data:
  postgres_server_certs:
  postgres_public_certs:
  pgadmin_data:
  prometheus_data:
  grafana_data:
  kafka_data:
  rabbitmq_data:
  airflow_logs:

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge
