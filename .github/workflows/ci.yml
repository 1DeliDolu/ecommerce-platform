name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Run Backend Tests
        run: mvn -B test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies
        run: npm ci
      - name: Build Frontend
        run: npm run build

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Compose
        run: docker compose config >/dev/null

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  image-scan:
    runs-on: ubuntu-latest
    needs: compose-validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            image: ecommerce-platform-backend:latest
          - service: frontend
            image: ecommerce-platform-frontend:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Image
        run: docker compose build ${{ matrix.service }}
      - name: Scan Image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ matrix.image }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"
